name: Prefetch rate data for Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"  # daily 06:17 UTC

permissions:
  contents: write

jobs:
  prefetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prefetch
        run: |
          python tools/prefetch_pages_data.py --out site/data --allow-fred-fallback

      - name: Validate pages data
        run: |
          python tools/validate_pages_data.py --dir site/data --require-nonempty

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/*.json
          git commit -m "Update Pages cached rate data" || echo "No changes"
          git push
